# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-management

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Maven
        uses: stCarolas/setup-maven@v5.1
        with:
          maven-version: 3.9.9

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Ensure Maven wrapper is executable
        run: chmod +x ./mvnw


      # Do not set JWT_SECRET here unless the repository secret is defined. An unset
      # secret expands to an empty string and overrides jwt.secret from application.properties,
      # which causes JJWT WeakKeyException during tests.
      - name: Build with Maven
        run: ./mvnw -B package

      # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5
        with:
          directory: user-management
